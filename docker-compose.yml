services:
  backend:
    build:
      context: ./backend
    container_name: hr_support_backend
    restart: always
    ports:
      - "8003:8000"
    env_file:
      - ./backend/.env
    volumes:
      - chroma_data:/app/chroma_data
      - uploads:/app/uploads
      - sqlite_data:/app

volumes:
  chroma_data:
  uploads:
  sqlite_data:
